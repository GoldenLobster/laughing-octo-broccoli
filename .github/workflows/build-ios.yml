name: Build Unsigned iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build JS Bridge
        run: |
          rm -rf node_modules package-lock.json
          npm install
          npm run build
          mkdir -p ../assets/js
          cp dist/bridge.bundle.js ../assets/js/bridge.bundle.js
        working-directory: js_bridge

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build iOS App (No Codesign)
        run: flutter build ios --release --no-codesign || echo "Flutter codesign verification failed (expected for unsigned builds)"

      - name: Package to IPA
        run: |
          mkdir -p build/ios/iphoneos/Payload
          
          # Find where xcodebuild actually placed Runner.app
          # (Flutter only copies it to build/ios/iphoneos if the build fully succeeds without code-signing errors)
          APP_PATH=$(find build/ios -name "Runner.app" -type d | grep "Release-iphoneos" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build/ios -name "Runner.app" -type d | head -n 1)
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: Runner.app was not built! There was a real compilation error."
            exit 1
          fi
          
          mv "$APP_PATH" build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -qr Aurora.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aurora-Unsigned-IPA
          path: build/ios/iphoneos/Aurora.ipa
