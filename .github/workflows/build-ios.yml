name: Build Unsigned iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build JS Bridge
        run: |
          rm -rf node_modules package-lock.json
          npm install
          npm run build
          mkdir -p ../assets/js
          cp dist/bridge.bundle.js ../assets/js/bridge.bundle.js
        working-directory: js_bridge

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build iOS App (No Codesign)
        run: flutter build ios --release --no-codesign || echo "Flutter codesign verification failed (expected for unsigned builds)"

      - name: Package to IPA
        run: |
          mkdir -p build/ios/iphoneos/Payload

          # Verify that Runner.app was actually built before xcodebuild failed on code signing
          if [ ! -d "build/ios/iphoneos/Runner.app" ]; then
            echo "Error: Runner.app was not built! There was a real compilation error."
            exit 1
          fi

          mv build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -qr Aurora.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aurora-Unsigned-IPA
          path: build/ios/iphoneos/Aurora.ipa
