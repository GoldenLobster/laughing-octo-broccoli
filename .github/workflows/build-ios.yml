name: Build Unsigned iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build JS Bridge
        run: |
          rm -rf node_modules package-lock.json
          npm install
          npm run build
          mkdir -p ../assets/js
          cp dist/bridge.bundle.js ../assets/js/bridge.bundle.js
        working-directory: js_bridge

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Disable Code Signing and Build
        run: |
          # Use xcodebuild directly to pass global code signing overrides
          cd ios
          pod install
          xcodebuild -workspace Runner.xcworkspace -scheme Runner -configuration Release -sdk iphoneos build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" CODE_SIGN_ENTITLEMENTS=""

      - name: Package to IPA
        run: |
          mkdir -p build/ios/iphoneos/Payload
          # xcodebuild output goes to ios/build/Release-iphoneos by default if derived data isn't changed
          # Wait, flutter's xcode_backend.sh overrides SYMROOT to build/ios.
          # Let's find the Runner.app wherever it was built.
          APP_PATH=$(find . -name "Runner.app" -type d | grep "Release-iphoneos" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -name "Runner.app" -type d | head -n 1)
          fi
          mv "$APP_PATH" build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -qr Aurora.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aurora-Unsigned-IPA
          path: build/ios/iphoneos/Aurora.ipa
